<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Study Buddy</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cyan: #00e5ff;
        --blue: #1565c0;
        --purple: #7c3aed;
        --pink: #e040fb;
        --dark: #020b18;
        --card: rgba(5, 20, 45, 0.82);
        --border: rgba(0, 229, 255, 0.35);
        --glow:
          0 0 24px rgba(0, 229, 255, 0.4), 0 0 60px rgba(0, 229, 255, 0.12);
      }

      html,
      body {
        min-height: 100%;
        background: var(--dark);
        color: #e0f4ff;
        font-family: "Exo 2", sans-serif;
        overflow-x: hidden;
      }

      /* ── Animated starfield background ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 80% 60% at 15% 50%,
            rgba(21, 101, 192, 0.22) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 60% 50% at 85% 50%,
            rgba(124, 58, 237, 0.18) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 100% 80% at 50% 100%,
            rgba(0, 229, 255, 0.07) 0%,
            transparent 60%
          ),
          var(--dark);
        pointer-events: none;
      }

      /* Grid lines */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image:
          linear-gradient(rgba(0, 229, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 229, 255, 0.04) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
      }

      /* Floating binary particles */
      .particles {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .bit {
        position: absolute;
        font-family: "Exo 2", monospace;
        font-size: 11px;
        color: rgba(0, 229, 255, 0.18);
        animation: floatBit linear infinite;
        user-select: none;
      }

      @keyframes floatBit {
        0% {
          transform: translateY(110vh);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 0.6;
        }
        100% {
          transform: translateY(-10vh);
          opacity: 0;
        }
      }

      /* ── Page layout ── */
      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px 60px;
      }

      /* ── Header ── */
      .header {
        text-align: center;
        margin-bottom: 40px;
        animation: fadeDown 0.8s ease both;
      }

      .logo-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin-bottom: 10px;
      }

      .bot-icon {
        width: 54px;
        height: 54px;
        background: linear-gradient(135deg, #00e5ff 0%, #1565c0 100%);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        box-shadow: var(--glow);
        animation: pulse 3s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow:
            0 0 20px rgba(0, 229, 255, 0.5),
            0 0 50px rgba(0, 229, 255, 0.15);
        }
        50% {
          box-shadow:
            0 0 35px rgba(0, 229, 255, 0.8),
            0 0 80px rgba(0, 229, 255, 0.3);
        }
      }

      .title {
        font-family: "Orbitron", sans-serif;
        font-size: clamp(28px, 5vw, 46px);
        font-weight: 900;
        letter-spacing: 3px;
      }
      .title .ai {
        color: var(--cyan);
      }
      .title .rest {
        color: #ffffff;
      }

      .subtitle {
        font-size: 15px;
        color: rgba(224, 244, 255, 0.6);
        font-weight: 300;
        letter-spacing: 0.5px;
      }

      /* ── Card ── */
      .card {
        width: 100%;
        max-width: 560px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 38px 36px 34px;
        backdrop-filter: blur(20px);
        box-shadow:
          0 0 0 1px rgba(0, 229, 255, 0.1),
          0 8px 40px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        animation: fadeUp 0.9s 0.2s ease both;
        position: relative;
        overflow: hidden;
      }

      /* Neon corner accents */
      .card::before,
      .card::after {
        content: "";
        position: absolute;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        filter: blur(40px);
        pointer-events: none;
      }
      .card::before {
        top: -20px;
        left: -20px;
        background: rgba(0, 229, 255, 0.25);
      }
      .card::after {
        bottom: -20px;
        right: -20px;
        background: rgba(124, 58, 237, 0.25);
      }

      .card-title {
        font-family: "Orbitron", sans-serif;
        font-size: 20px;
        text-align: center;
        margin-bottom: 6px;
        color: #fff;
      }
      .card-title span {
        color: var(--cyan);
      }

      .card-sub {
        text-align: center;
        font-size: 13px;
        color: rgba(224, 244, 255, 0.5);
        margin-bottom: 26px;
      }

      /* ── Input ── */
      .input-wrap {
        position: relative;
        margin-bottom: 18px;
      }
      .search-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--cyan);
        font-size: 17px;
        pointer-events: none;
      }
      #topic {
        width: 100%;
        padding: 14px 18px 14px 46px;
        background: rgba(0, 229, 255, 0.06);
        border: 1.5px solid rgba(0, 229, 255, 0.35);
        border-radius: 12px;
        color: #e0f4ff;
        font-family: "Exo 2", sans-serif;
        font-size: 15px;
        outline: none;
        transition:
          border-color 0.3s,
          box-shadow 0.3s,
          background 0.3s;
      }
      #topic::placeholder {
        color: rgba(224, 244, 255, 0.35);
      }
      #topic:focus {
        border-color: var(--cyan);
        background: rgba(0, 229, 255, 0.1);
        box-shadow:
          0 0 0 3px rgba(0, 229, 255, 0.15),
          var(--glow);
      }

      /* ── Button ── */
      #explainBtn {
        width: 100%;
        padding: 15px;
        background: linear-gradient(90deg, #0077cc 0%, #00c8ff 100%);
        border: none;
        border-radius: 12px;
        color: #fff;
        font-family: "Orbitron", sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 2.5px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.3s,
          opacity 0.2s;
        box-shadow:
          0 0 24px rgba(0, 200, 255, 0.45),
          0 4px 16px rgba(0, 0, 0, 0.4);
        position: relative;
        overflow: hidden;
        margin-bottom: 18px;
      }
      #explainBtn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.18) 50%,
          transparent 100%
        );
        transform: translateX(-100%);
        transition: transform 0.5s;
      }
      #explainBtn:hover:not(:disabled)::after {
        transform: translateX(100%);
      }
      #explainBtn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow:
          0 0 40px rgba(0, 200, 255, 0.7),
          0 6px 24px rgba(0, 0, 0, 0.5);
      }
      #explainBtn:active:not(:disabled) {
        transform: translateY(0);
      }
      #explainBtn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      /* ── Output box ── */
      .output-box {
        background: rgba(0, 10, 30, 0.7);
        border: 1px solid rgba(0, 229, 255, 0.2);
        border-radius: 14px;
        padding: 18px 20px;
        min-height: 90px;
        display: flex;
        align-items: flex-start;
        gap: 14px;
        transition: border-color 0.4s;
      }
      .output-box.active {
        border-color: rgba(0, 229, 255, 0.5);
      }

      .output-avatar {
        width: 36px;
        height: 36px;
        flex-shrink: 0;
        background: linear-gradient(135deg, #00e5ff22, #1565c044);
        border: 1px solid rgba(0, 229, 255, 0.3);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .output-content {
        flex: 1;
      }

      .output-label {
        font-family: "Orbitron", sans-serif;
        font-size: 12px;
        color: var(--cyan);
        letter-spacing: 1px;
        margin-bottom: 6px;
      }

      #output {
        font-size: 14px;
        line-height: 1.7;
        color: rgba(224, 244, 255, 0.75);
        min-height: 42px;
      }

      /* Loading dots */
      .dots span {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: var(--cyan);
        border-radius: 50%;
        margin: 0 2px;
        animation: bounce 1.2s infinite;
      }
      .dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }

      /* Typewriter cursor */
      .cursor {
        display: inline-block;
        width: 2px;
        height: 14px;
        background: var(--cyan);
        margin-left: 2px;
        vertical-align: middle;
        animation: blink 0.8s step-end infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      /* ── Footer ── */
      .footer {
        margin-top: 32px;
        font-size: 13px;
        color: rgba(224, 244, 255, 0.35);
        text-align: center;
        animation: fadeUp 1s 0.5s ease both;
      }
      .footer .heart {
        color: #3b82f6;
      }

      /* ── Animations ── */
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <!-- Floating binary bits -->
    <div class="particles" id="particles"></div>

    <div class="page">
      <!-- Header -->
      <div class="header">
        <div class="logo-row">
          <div class="bot-icon">🤖</div>
          <div class="title">
            <span class="ai">AI</span> <span class="rest">STUDY BUDDY</span>
          </div>
        </div>
        <p class="subtitle">Your AI-powered learning assistant</p>
      </div>

      <!-- Main card -->
      <div class="card">
        <div class="card-title">Ask any <span>topic</span></div>
        <p class="card-sub">Get a simple, AI-style explanation in seconds.</p>

        <div class="input-wrap">
          <span class="search-icon">🔍</span>
          <input
            id="topic"
            type="text"
            placeholder="Enter a topic (e.g. AI, gravity, photosynthesis)"
            autocomplete="off"
          />
        </div>

        <button id="explainBtn" onclick="explain()">EXPLAIN</button>

        <div class="output-box" id="outputBox">
          <div class="output-avatar">🤖</div>
          <div class="output-content">
            <div class="output-label">AI's Explanation</div>
            <div id="output">
              Enter a topic above and click "Explain" to see the magic ✨
            </div>
          </div>
        </div>
      </div>

      <div class="footer">
        Built with <span class="heart">💙</span> by Marion &nbsp;|&nbsp; Keep
        learning, keep growing.
      </div>
    </div>

    <script>
      /* ── Particle bits ── */
      (function () {
        const container = document.getElementById("particles");
        const bits = [
          "0",
          "1",
          "01",
          "10",
          "0101",
          "1010",
          "AI",
          "∑",
          "λ",
          "∞",
          "⊕",
          "∇",
        ];
        for (let i = 0; i < 30; i++) {
          const el = document.createElement("span");
          el.className = "bit";
          el.textContent = bits[Math.floor(Math.random() * bits.length)];
          el.style.left = Math.random() * 100 + "vw";
          el.style.animationDuration = 12 + Math.random() * 20 + "s";
          el.style.animationDelay = -Math.random() * 25 + "s";
          el.style.fontSize = 9 + Math.random() * 8 + "px";
          el.style.opacity = (0.08 + Math.random() * 0.18).toString();
          container.appendChild(el);
        }
      })();

      /* ── Enter key support ── */
      document.getElementById("topic").addEventListener("keydown", (e) => {
        if (e.key === "Enter") explain();
      });

      /* ── Typewriter effect ── */
      function typeText(el, text, speed = 22) {
        el.innerHTML = "";
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        el.appendChild(cursor);
        let i = 0;
        const iv = setInterval(() => {
          el.insertBefore(document.createTextNode(text[i]), cursor);
          i++;
          if (i >= text.length) {
            clearInterval(iv);
            setTimeout(() => cursor.remove(), 1200);
          }
        }, speed);
      }

      /* ── Main explain function ── */
      async function explain() {
        const topic = document.getElementById("topic").value.trim();
        if (!topic) return;

        const output = document.getElementById("output");
        const btn = document.getElementById("explainBtn");
        const box = document.getElementById("outputBox");

        btn.disabled = true;
        box.classList.add("active");
        output.innerHTML =
          '<span class="dots"><span></span><span></span><span></span></span>';

        /* Fallback answers for offline / API key absent */
        const fallback = {
          gravity:
            "Gravity is a fundamental force that pulls objects with mass toward each other. On Earth, it keeps us grounded and makes objects fall at ~9.8 m/s². It's what keeps planets in orbit around the Sun.",
          photosynthesis:
            "Photosynthesis is how plants convert sunlight, water, and carbon dioxide into glucose (food) and oxygen. It happens in chloroplasts using chlorophyll — the pigment that makes leaves green.",
          ai: "Artificial Intelligence is the science of building systems that can perform tasks normally requiring human intelligence — like learning, reasoning, recognising patterns, and making decisions.",
        };

        const key = topic.toLowerCase().replace(/[^a-z]/g, "");

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              messages: [
                {
                  role: "user",
                  content: `You are a friendly, brilliant tutor called AI Study Buddy. Explain "${topic}" in 2-3 clear, engaging sentences that a curious high-school student would love. Be accurate, use a vivid analogy if helpful, and end with one fascinating fact. No markdown, no bullet points — plain prose only.`,
                },
              ],
            }),
          });

          if (!res.ok) throw new Error("API error");
          const data = await res.json();
          const text = data.content?.find((b) => b.type === "text")?.text || "";
          if (text) {
            typeText(output, text);
          } else throw new Error("empty");
        } catch (_) {
          /* Use built-in fallback if API fails */
          const answer =
            fallback[key] ||
            `"${topic}" is a fascinating subject! Unfortunately I couldn't reach the AI right now. Try topics like 'AI', 'gravity', or 'photosynthesis' for instant answers, or check your connection.`;
          typeText(output, answer);
        }

        btn.disabled = false;
      }
    </script>
  </body>
</html>
